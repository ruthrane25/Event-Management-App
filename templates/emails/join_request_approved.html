<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #0f0f1a; 
            margin: 0; 
            padding: 40px 20px; 
            color: #f0f0ff;
        }
        .container { 
            max-width: 540px; 
            margin: 0 auto; 
            background-color: #17172a; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
            border: 1px solid #2d2d52;
        }
        .header { 
            background: linear-gradient(135deg, #22c55e, #16a34a); 
            padding: 40px 30px; 
            text-align: center; 
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
        }
        .content { 
            padding: 40px; 
            text-align: center;
        }
        .status-icon {
            font-size: 48px;
            margin-bottom: 20px;
            color: #22c55e;
        }
        .event-name {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 20px;
        }
        .message {
            font-size: 16px;
            color: #9898c8;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button { 
            display: inline-block; 
            padding: 16px 32px; 
            background-color: #6c63ff; 
            color: #ffffff; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 16px;
        }
        .footer { 
            text-align: center; 
            padding: 30px; 
            font-size: 12px; 
            color: #5a5a8a; 
            background-color: rgba(15, 15, 26, 0.5);
            border-top: 1px solid #2d2d52;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Request Approved!</h1>
        </div>
        <div class="content">
            <div class="status-icon">🎉</div>
            <p class="message">Hello <strong>{{ user_name }}</strong>,</p>
            <p class="message">
                Great news! Your request to join the event <strong>{{ event_name }}</strong> has been approved by the admin.
            </p>
            <p class="message">
                You can now access the full event dashboard, manage guests, and more.
            </p>
            <a href="{{ dashboard_url }}" class="button">Go to Dashboard</a>
        </div>
        <div class="footer">
            <p>Sent via EventFlow — Seamless Event Management</p>
            <p>&copy; 2024 EventFlow Team</p>
        </div>
    </div>
</body>
</html>
